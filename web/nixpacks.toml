# Coolify/Nixpacks build overrides.
#
# install: re-run without --frozen-lockfile so pnpm honors supportedArchitectures
# and fetches the Linux rolldown binding (see git history / rolldown#9098), then
# install the Chromium binary + its system libraries for Playwright OG rendering.
#
# build: produce the static site, then generate OG PNGs into dist/og/ with the
# OG render script (needs DATABASE_URL, same as the build).
[phases.install]
cmds = [
  "rm -f pnpm-lock.yaml",
  "pnpm install --no-frozen-lockfile",
  "pnpm exec playwright install --with-deps chromium",
]

[phases.build]
cmds = [
  "pnpm build",
  "pnpm og",
]
